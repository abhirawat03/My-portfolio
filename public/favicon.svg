<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Rounded Background -->
  <rect width="100" height="100" rx="20" fill="#0c0e14" />
  
  <!-- Monogram Initials (AR) -->
  <text x="50" y="62" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="38" font-weight="700" fill="#3b82f6" text-anchor="middle">
    AR
  </text>
  
  <!-- Curly Braces showing coding background -->
  <text x="18" y="60" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="32" font-weight="400" fill="#06b6d4" text-anchor="middle">
    {
  </text>
  <text x="82" y="60" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="32" font-weight="400" fill="#06b6d4" text-anchor="middle">
    }
  </text>
</svg>